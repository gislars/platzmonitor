# Site fuer fossgis.mapwebbing.eu
# Voraussetzung: http-snippet-limits.conf ist im http-Block eingebunden (siehe README).
#
# Installation (Debian/Ubuntu):
#   sudo cp fossgis.mapwebbing.eu.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/fossgis.mapwebbing.eu.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name fossgis.mapwebbing.eu;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fossgis.mapwebbing.eu;

    # Nach certbot (oder manuell) setzen, dann nginx -t
    ssl_certificate     /etc/letsencrypt/live/fossgis.mapwebbing.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fossgis.mapwebbing.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # optional, oft erst nach erstem certbot-Lauf vorhanden:
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types application/json text/plain;
    client_max_body_size 1m;

    # FastAPI: oeffentlich /backend/..., upstream ohne Praefix
    location /backend/ {
        limit_req zone=platzmonitor_api burst=30 nodelay;
        rewrite ^/backend/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA (Vite build mit base /frontend/): Inhalt von dist/ nach /var/www/platzmonitor/frontend/ kopieren
    # root /var/www/platzmonitor;
    # location /frontend/ {
    #     try_files $uri $uri/ /frontend/index.html;
    # }

    location = / {
        return 404;
    }
}
