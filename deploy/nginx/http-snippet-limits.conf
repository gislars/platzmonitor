# In den http { }-Block von nginx einbinden, z. B.:
#   include /etc/nginx/snippets/platzmonitor-limits.conf;
# oder Symlink nach /etc/nginx/conf.d/zz-platzmonitor-limits.conf
#
# Zone fuer limit_req in der Site-Konfiguration (fossgis.mapwebbing.eu).

limit_req_zone $binary_remote_addr zone=platzmonitor_api:10m rate=10r/s;
